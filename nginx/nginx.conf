events {
    worker_connections 1024;
}

http {
    # ---------------------------------------------------------------------------
    # Redirecionar HTTP → HTTPS
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name agentk.local _;

        return 301 https://$host$request_uri;
    }

    # ---------------------------------------------------------------------------
    # Reverse Proxy HTTPS → AgentK Client (porta 8501)
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name agentk.local _;

        ssl_certificate     /etc/nginx/certs/agentk.crt;
        ssl_certificate_key /etc/nginx/certs/agentk.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # -----------------------------------------------------------------------
        # Keycloak — acesso direto (admin + fluxo OIDC do browser).
        # Não passa pelo oauth2-proxy para evitar dependência circular:
        # o Keycloak precisa estar acessível ANTES de qualquer autenticação.
        # -----------------------------------------------------------------------
        location /keycloak/ {
            # Sem '/' final no proxy_pass: o nginx preserva o path completo,
            # repassando /keycloak/admin/ como /keycloak/admin/ ao Keycloak.
            # KC_HTTP_RELATIVE_PATH=/keycloak garante que o Keycloak escute nesse caminho.
            proxy_pass              http://keycloak:8080;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_set_header        X-Forwarded-Host  $host;
            proxy_set_header        X-Forwarded-Port  443;
            proxy_buffer_size       128k;
            proxy_buffers           4 256k;
            proxy_busy_buffers_size 256k;
        }

        # -----------------------------------------------------------------------
        # Aplicação principal — todo tráfego passa pelo oauth2-proxy.
        # O oauth2-proxy valida a sessão e redireciona para o Keycloak se necessário.
        # -----------------------------------------------------------------------
        location / {
            proxy_pass         http://oauth2-proxy:4180;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket (Streamlit)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
