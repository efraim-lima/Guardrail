events {
    worker_connections 1024;
}

http {
  # DNS interno do Docker para resolver nomes de servico em runtime.
  resolver 127.0.0.11 valid=10s ipv6=off;

    # ---------------------------------------------------------------------------
    # Redirecionar HTTP → HTTPS
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name agentk.local _;

        return 301 https://$host$request_uri;
    }

    # ---------------------------------------------------------------------------
    # Reverse Proxy HTTPS → AgentK Client (porta 8501)
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name agentk.local _;

        ssl_certificate     /etc/nginx/certs/agentk.crt;
        ssl_certificate_key /etc/nginx/certs/agentk.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # -----------------------------------------------------------------------
        # Keycloak — acesso direto (admin + fluxo OIDC do browser).
        # Não passa pelo oauth2-proxy para evitar dependência circular:
        # o Keycloak precisa estar acessível ANTES de qualquer autenticação.
        # -----------------------------------------------------------------------
        location /keycloak/ {
            # Sem '/' final no proxy_pass: o nginx preserva o path completo,
            # repassando /keycloak/admin/ como /keycloak/admin/ ao Keycloak.
            # KC_HTTP_RELATIVE_PATH=/keycloak garante que o Keycloak escute nesse caminho.
            proxy_pass              http://keycloak:8080;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_set_header        X-Forwarded-Host  $host;
            proxy_set_header        X-Forwarded-Port  443;
            proxy_buffer_size       128k;
            proxy_buffers           4 256k;
            proxy_busy_buffers_size 256k;
        }

          # Evita redirecionamentos OIDC para favicon e reduz callbacks duplicados.
          location = /favicon.ico {
            access_log off;
            return 204;
          }

        # -----------------------------------------------------------------------
        # Callback OAuth2: callbacks duplicados podem gerar invalid_grant.
        # Em vez de exibir 500, redireciona para novo login automaticamente.
        # -----------------------------------------------------------------------
        location = /oauth2/callback {
          set                $oauth2_upstream http://oauth2-proxy:4180;
          proxy_pass         $oauth2_upstream;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          # Callback pode retornar Set-Cookie grande.
          proxy_buffer_size  64k;
          proxy_buffers      8 64k;
          proxy_busy_buffers_size 128k;
          proxy_intercept_errors on;
          error_page 500 502 503 504 =302 /oauth2/sign_in?rd=/;
        }

        # Endpoints internos do oauth2-proxy (static, sign_in, auth, etc.)
        location /oauth2/ {
          set                $oauth2_upstream http://oauth2-proxy:4180;
          proxy_pass         $oauth2_upstream;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_buffer_size  64k;
          proxy_buffers      8 64k;
          proxy_busy_buffers_size 128k;
        }

        # -----------------------------------------------------------------------
        # Aplicacao principal -- todo trafego passa pelo oauth2-proxy.
        # O oauth2-proxy valida a sessao e redireciona para o Keycloak se necessario.
        # -----------------------------------------------------------------------
        location / {
          # Usa variavel para adiar resolucao DNS para runtime e evitar
          # erro de bootstrap quando oauth2-proxy ainda nao registrou no DNS.
          set                $oauth2_upstream http://oauth2-proxy:4180;
          proxy_pass         $oauth2_upstream;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket (Streamlit)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;

            # Se oauth2-proxy estiver indisponivel, retorna 502.
            # Interceptamos e exibimos pagina de instrucao.
            proxy_intercept_errors on;
            error_page 502 503 504 =503 @auth_unavailable;
        }

        # Pagina exibida quando a camada de autenticacao esta indisponivel.
        location @auth_unavailable {
            default_type text/html;
            return 503 '<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="10">
  <title>AgentK - Autenticacao Indisponivel</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; color: #333; }
    h2   { color: #c0392b; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-size: 0.95em; }
    a    { color: #2980b9; }
    .box { background: #fef9e7; border-left: 4px solid #f39c12; padding: 12px 16px; margin: 20px 0; }
    .ok  { background: #eafaf1; border-left: 4px solid #27ae60; padding: 12px 16px; margin: 20px 0; }
  </style>
</head>
<body>
  <h2>Autenticacao temporariamente indisponivel</h2>
  <p>O servico <strong>oauth2-proxy</strong> esta inicializando ou indisponivel no momento.<br>
     A pagina sera recarregada automaticamente.</p>
    <div class="box">
    <strong>Tente novamente em alguns segundos.</strong><br><br>
    <code>Atualizacao automatica a cada 10 segundos</code>
  </div>
  <div class="ok">
    <strong>Acesso ao Keycloak Admin:</strong><br><br>
    <a href="/keycloak/admin/">/keycloak/admin/</a>
  </div>
  <p style="color:#888; font-size:0.85em">Se persistir, verifique os logs de nginx e oauth2-proxy.</p>
</body>
</html>';
        }
    }
}
