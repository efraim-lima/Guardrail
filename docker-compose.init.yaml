# =============================================================================
# docker-compose.init.yaml (ALTERNATIVA)
#
# Versão alternativa do docker-compose que inclui um serviço "init" 
# que executa setup.sh antes de iniciar os outros serviços.
#
# Uso: docker compose -f docker-compose.init.yaml up -d --build
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Serviço de Inicialização (executa setup.sh)
  # ---------------------------------------------------------------------------
  init:
    image: alpine:latest
    container_name: agentk-init
    working_dir: /workspace
    volumes:
      - .:/workspace
    entrypoint: /workspace/docker-entrypoint-init.sh
    # Este serviço executa e termina imediatamente após completar
    # Os outros serviços esperam por ele antes de iniciar (via depends_on)

  # ---------------------------------------------------------------------------
  # Gateway Java (Executa o JAR pré-compilado ofuscado)
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentk-gateway
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - agentk-network
    environment:
      - WEBHOOK_PORT=8080
      - WEBHOOK_PATH=/validar
      - OLLAMA_ENDPOINT=http://ollama:11434/api/generate
      - OLLAMA_MODEL=qwen2.5:1.5b
      - KEYSTORE_PATH=/app/gateway-keystore.p12
      - KEYSTORE_PASSWORD=gateway-secret
    entrypoint: [ "java", "-jar", "/app/app.jar" ]
    depends_on:
      - init
      - ollama
    volumes:
      - ./config:/app/config:ro
      - ./inspection-terms.xml:/app/inspection-terms.xml:ro
      - ./monitored-sites.xml:/app/monitored-sites.xml:ro
      - ./gateway-keystore.p12:/app/gateway-keystore.p12:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Keycloak
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: keycloak
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_DB=dev-file
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks:
      - agentk-network
    depends_on:
      - init
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OAuth2 Proxy
  # ---------------------------------------------------------------------------
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    command:
      - --http-address=0.0.0.0:4180
      - --upstream=http://agentk-client:8501
      - --provider=keycloak-oidc
      - --client-id=${OAUTH2_PROXY_CLIENT_ID:-oauth2-proxy}
      - --client-secret=${OAUTH2_PROXY_CLIENT_SECRET:-SEU_CLIENT_SECRET}
      - --redeem-url=http://keycloak:8080/realms/agentk/protocol/openid-connect/token
      - --oidc-issuer-url=http://keycloak:8080/realms/agentk
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET:-agentktccsecretkey1234567890abcd}
      - --cookie-secure=false
      - --email-domain=*
      - --skip-provider-button=true
      - --oidc-extra-audience=${OAUTH2_PROXY_CLIENT_ID:-oauth2-proxy}
      - --whitelist-domain=keycloak
      - --backend-logout-url=http://keycloak:8080/realms/agentk/protocol/openid-connect/logout
    ports:
      - "127.0.0.1:4180:4180"
    networks:
      - agentk-network
    depends_on:
      - init
      - keycloak
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Ollama — LLM Local
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11435}:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    entrypoint: [ "sh", "-c", "ollama serve & sleep 5 && ollama pull qwen2.5:1.5b && wait" ]
    networks:
      - agentk-network
    depends_on:
      - init

  # ---------------------------------------------------------------------------
  # Nginx - Reverse Proxy com HTTPS
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    networks:
      - agentk-network
    depends_on:
      - init
      - oauth2-proxy
    restart: unless-stopped

# =============================================================================
# Redes
# =============================================================================
networks:
  agentk-network:
    driver: bridge
    name: agentk-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  keycloak-data:
    driver: local
  ollama-data:
    driver: local
