# =============================================================================
# AgentK Security Gateway — Docker Compose
#
# Topologia:
#   ┌─────────────────────┐    gateway-net (isolada)   ┌─────────────────┐
#   │  gateway (este svc) │ ◄────────────────────────► │  agentk-mcp-    │
#   │  porta 8443 / 8080  │                            │  server         │
#   └─────────────────────┘                            └─────────────────┘
#
# Persistência no boot:
#   restart: unless-stopped  →  sobe quando o daemon Docker subir.
#   Para garantir que o daemon sobe no boot do SO:
#     sudo systemctl enable docker
#
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # gateway — proxy TLS headless de interceptação/análise de tráfego
  #
  # O build da imagem utiliza um Dockerfile multi-stage, garantindo que
  # o JAR ofuscado seja construído automaticamente pelo Docker.
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentk-security-gateway:1.0.0
    container_name: agentk-gateway

    # Headless: sem terminal, sem stdin
    stdin_open: false
    tty: false

    # Sempre reinicia (inclusive após reboot do servidor)
    restart: unless-stopped

    # Capacidades necessárias para iptables dentro do container
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # O gateway precisa manipular a tabela NAT do kernel do host
    network_mode: "host"        # usa a stack de rede do host → iptables funciona

    environment:
      # Portas
      GATEWAY_MITM_PORT: "${GATEWAY_MITM_PORT:-8443}"
      WEBHOOK_PORT: "${WEBHOOK_PORT:-8080}"
      WEBHOOK_PATH: "${WEBHOOK_PATH:-/validar}"

      # Certificados CA
      CA_CERT_PATH: "/app/certs/gateway-ca.crt"
      CA_KEY_PATH:  "/app/keys/gateway-ca.key"

      # Keystore PKCS12
      KEYSTORE_FILE:     "/app/keys/gateway-keystore.p12"
      KEYSTORE_PASSWORD: "${KEYSTORE_PASSWORD:-gateway-secret}"
      KEYSTORE_ALIAS:    "agentk-gateway"

      # AgentK — hostname acessível via rede do host ou nome do container
      AGENTK_DOCKER_CONTAINER: "${AGENTK_DOCKER_CONTAINER:-agentk-mcp-server}"
      SKIP_DOCKER_CA_SETUP:    "${SKIP_DOCKER_CA_SETUP:-0}"

      # Redirecionamento iptables
      TARGET_PORT:  "443"
      GATEWAY_PORT: "${GATEWAY_MITM_PORT:-8443}"
      GATEWAY_USER: "root"

      # Logs sem buffer (saída imediata nos logs do Docker)
      JAVA_TOOL_OPTIONS: "-Djava.util.logging.SimpleFormatter.format=%1$tF %1$tT %4$s %5$s%n"

    volumes:
      # Volume persistente: certificados e keystore sobrevivem a recriações do container
      - gateway-certs:/app/certs
      - gateway-keys:/app/keys
      # Configurações somente-leitura do projeto
      - ./config:/app/config:ro
      - ./inspection-terms.xml:/app/inspection-terms.xml:ro
      - ./monitored-sites.xml:/app/monitored-sites.xml:ro

    # Healthcheck: confirma que o webhook está respondendo
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:${WEBHOOK_PORT:-8080}/validar || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # agentk-mcp-server — serviço AgentK (referência; substitua pela imagem real)
  # Remova ou ajuste este bloco se o AgentK já está rodando separadamente.
  # ---------------------------------------------------------------------------
  agentk-mcp-server:
    image: "${AGENTK_IMAGE:-ghcr.io/agentk/mcp-server:latest}"
    container_name: agentk-mcp-server
    restart: unless-stopped
    stdin_open: false
    tty: false

    networks:
      - gateway-net

    environment:
      # Aponta as bibliotecas SSL do Python/Node para a CA do Gateway
      SSL_CERT_FILE:       "/certs/gateway-ca.crt"
      REQUESTS_CA_BUNDLE:  "/certs/gateway-ca.crt"
      NODE_EXTRA_CA_CERTS: "/certs/gateway-ca.crt"

    volumes:
      # CA do gateway para que o AgentK confie nos certificados forjados
      - gateway-certs:/certs:ro

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Ollama — LLM Local
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    entrypoint: [ "sh", "-c", "ollama serve & sleep 5 && ollama pull qwen2.5:1.5b && wait" ]
    networks:
      - gateway-net

# =============================================================================
# Volumes nomeados — persistem dados entre recriações de containers
# =============================================================================
volumes:
  gateway-certs:
    name: agentk-gateway-certs
  gateway-keys:
    name: agentk-gateway-keys
  ollama-data:
    name: ollama-data

# =============================================================================
# Redes
# =============================================================================
networks:
  # Rede isolada para comunicação privada entre gateway e AgentK
  gateway-net:
    name: agentk-gateway-net
    driver: bridge
    ipam:
      config:
        - subnet: "172.28.0.0/24"
