  #   restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Keycloak
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: keycloak
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_DB=dev-file
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks:
      - agentk-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OAuth2 Proxy
  # ---------------------------------------------------------------------------
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    command:
      - --http-address=0.0.0.0:4180
      - --upstream=http://agentk-client:8501
      - --provider=keycloak-oidc
      - --client-id=${OAUTH2_PROXY_CLIENT_ID:-oauth2-proxy}
      - --client-secret=${OAUTH2_PROXY_CLIENT_SECRET:-SEU_CLIENT_SECRET}
      - --redeem-url=http://keycloak:8080/realms/agentk/protocol/openid-connect/token
      - --oidc-issuer-url=http://keycloak:8080/realms/agentk
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET:-agentktccsecretkey1234567890abcd}
      - --cookie-secure=false
      - --email-domain=*
      - --skip-provider-button=true
      - --oidc-extra-audience=${OAUTH2_PROXY_CLIENT_ID:-oauth2-proxy}
      - --whitelist-domain=keycloak
      - --backend-logout-url=http://keycloak:8080/realms/agentk/protocol/openid-connect/logout
    ports:
      - "127.0.0.1:4180:4180"
    networks:
      - agentk-network
    depends_on:
      - keycloak
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Ollama — LLM Local
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    entrypoint: [ "sh", "-c", "ollama serve & sleep 5 && ollama pull qwen2.5:1.5b && wait" ]
    networks:
      - agentk-network

  # ---------------------------------------------------------------------------
  # Nginx - Reverse Proxy com HTTPS
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    networks:
      - agentk-network
    depends_on:
      - oauth2-proxy
    restart: unless-stopped

# =============================================================================
# Redes
# =============================================================================
networks:
  agentk-network:
    driver: bridge
    name: agentk-network
  # minikube:
  #   external: true
  #   name: minikube

# =============================================================================
# Volumes
# =============================================================================
volumes:
  # agentk-logs:
  #   driver: local
  keycloak-data:
    driver: local
  ollama-data:
    driver: local
