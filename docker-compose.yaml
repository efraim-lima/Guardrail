# =============================================================================
# Compose Final: Gateway + AgentK server/client
#
# Este arquivo ASSUME que o binário do gateway já foi compilado através
# do gradle (build/libs/gateway-sensor-1.0.0-obf.jar). Não realiza build local.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Gateway Java (Executa o JAR pré-compilado ofuscado)
  # ---------------------------------------------------------------------------
  agentk-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentk-gateway
    restart: unless-stopped
    # Porta comentada na raiz para forçar acesso via Nginx (443)
    # ports:
    #   - "8081:8080"
    cap_add:
      - NET_ADMIN
    # AppArmor bloqueia o daemon Docker de enviar SIGTERM ao processo Java quando
    # o container usa cap_add: NET_ADMIN. Sem isso, 'docker stop' retorna "permission denied".
    security_opt:
      - apparmor:unconfined
    depends_on:
      - ollama
    networks:
      - agentk-network
    environment:
      - WEBHOOK_PORT=8080
      - WEBHOOK_PATH=/validar
      - OLLAMA_ENDPOINT=http://ollama:11434/api/generate
      - OLLAMA_MODEL=qwen2.5:1.5b
      - KEYSTORE_PATH=/app/gateway-keystore.p12
      - KEYSTORE_PASSWORD=gateway-secret
      - GATEWAY_MITM_PORT=8443
      - OLLAMA_WORKERS=8
      - OLLAMA_MAX_QUEUE=500
      - EMBEDDINGS_CACHE_PATH=/app/output/BASE.embeddings.json
    # Removido entrypoint fixo para usar o docker-entrypoint.sh interno
    volumes:
      - ./config:/app/config:ro
      - ./inspection-terms.xml:/app/inspection-terms.xml:ro
      - ./monitored-sites.xml:/app/monitored-sites.xml:ro
      - ./PROMPTS.md:/app/PROMPTS.md:ro
      - ./src/main/java/BASE.jsonl:/app/BASE.jsonl:ro
      - ./output:/app/output:rw
      - ./gateway-keystore.p12:/app/gateway-keystore.p12:ro

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: [ "CMD-SHELL", "pgrep java > /dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Servidor MCP AgentK
  # ---------------------------------------------------------------------------
  agentk-server:
    build:
      context: ./Agentk-Sugest/server
      dockerfile: Dockerfile
    container_name: agentk-mcp-server
    security_opt:
      - apparmor:unconfined
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:${AGENTK_MCP_HOST_PORT:-3334}:3333"
    environment:
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
      - FASTMCP_HOST=${FASTMCP_HOST:-0.0.0.0}
      - FASTMCP_PORT=${FASTMCP_PORT:-3333}
      - FASTMCP_LOG_LEVEL=${FASTMCP_LOG_LEVEL:-INFO}
      - KUBECONFIG=/app/config
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ~/.kube/config-embedded:/app/config:ro
      - agentk-logs:/var/log/agentk
    networks:
      - agentk-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: [ "CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',3333)); s.close()" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Cliente Streamlit AgentK
  # ---------------------------------------------------------------------------
  agentk-client:
    build:
      context: ./Agentk-Sugest/client
      dockerfile: Dockerfile
    container_name: agentk-streamlit-client
    security_opt:
      - apparmor:unconfined
    # Porta removida intencionalmente: o agentk-client NÃO deve ser acessível
    # diretamente do host. Todo tráfego deve passar por: nginx:443 → oauth2-proxy → aqui.
    # Expor esta porta permite contornar completamente a autenticação Keycloak.
    environment:
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
      - STREAMLIT_SERVER_HEADLESS=${STREAMLIT_SERVER_HEADLESS:-true}
      - STREAMLIT_SERVER_ENABLE_CORS=${STREAMLIT_SERVER_ENABLE_CORS:-false}
      - MCP_SERVER_URL=${MCP_SERVER_URL:-http://agentk-server:3333/sse}
      - GATEWAY_VALIDATE_URL=${GATEWAY_VALIDATE_URL:-https://agentk-gateway:8080/validar}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - agentk-logs:/var/log/agentk
    networks:
      - agentk-network
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      agentk-server:
        condition: service_healthy
      agentk-gateway:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Keycloak
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: keycloak
    user: root
    security_opt:
      - apparmor:unconfined
    # start-dev: executa o Keycloak em modo desenvolvimento com auto-rebuild.
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      mkdir -p /opt/keycloak/data/import &&
      cp /tmp/realm-agentk.json /opt/keycloak/data/import/realm-agentk.json &&
      /opt/keycloak/bin/kc.sh start-dev --import-realm --verbose
      "
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_DB=dev-file
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_RELATIVE_PATH=/keycloak
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true
      - KC_HEALTH_ENABLED=true
      - KC_IMPORT=/tmp/realm-agentk.json
    ports:
      # Porta de acesso direto ao Keycloak (sem nginx, sem autenticacao).
      # Util para setup inicial e debug. Acesso via nginx: /keycloak/admin/
      # Para acesso remoto (outra maquina): defina HOST_BIND_IP=0.0.0.0 no .env.
      - "${HOST_BIND_IP:-0.0.0.0}:8082:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      # Realm montado em local neutro para evitar NPE no escaneamento do Keycloak 26.
      - ./config/keycloak/realm-agentk.json:/tmp/realm-agentk.json:ro
    networks:
      - agentk-network
    deploy:
      resources:
        limits:
          memory: 1536M
    healthcheck:
      # Procura pela porta 8080 (1F90 hex) em qualquer interface (IPv4 ou IPv6).
      test: [ "CMD-SHELL", "grep -i ':1F90' /proc/net/tcp* || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OAuth2 Proxy
  # ---------------------------------------------------------------------------
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    # Imagem distroless (sem shell) com processo de longa duração — o AppArmor bloqueia
    # o daemon Docker de enviar SIGTERM ao container, causando "permission denied" no stop.
    security_opt:
      - apparmor:unconfined
    command:
      - --http-address=0.0.0.0:4180
      - --upstream=http://agentk-client:8501
      # Provider genérico OIDC — permite skip de discovery e controle total das URLs.
      # Necessário porque a URL de discovery pública (https://agentk.local/keycloak/...)
      # não é resolvível pelo container oauth2-proxy sem passar pelo nginx internamente.
      - --provider=oidc
      - --client-id=${OAUTH2_PROXY_CLIENT_ID:-oauth2-proxy}
      # Secret padrão gerado pelo realm-agentk.json. Altere em produção via .env.
      - --client-secret=${OAUTH2_PROXY_CLIENT_SECRET:-oauth2-proxy-secret}
      # Issuer: deve bater exatamente com o campo 'iss' dos JWTs emitidos pelo Keycloak.
      # Com KC_PROXY_HEADERS=xforwarded, o issuer é derivado do host público encaminhado pelo Nginx.
      - --oidc-issuer-url=https://agentk.local/keycloak/realms/agentk
      # Skip discovery: as URLs abaixo substituem o .well-known/openid-configuration.
      # As URLs internas (http://keycloak:8080/...) são usadas para comunicação
      # container-to-container (token exchange, JWKS) — sem passar pelo nginx.
      # A login-url usa a URL pública para que o BROWSER do usuário consiga alcançá-la.
      - --skip-oidc-discovery=true
      - --login-url=https://agentk.local/keycloak/realms/agentk/protocol/openid-connect/auth
      - --redeem-url=http://keycloak:8080/keycloak/realms/agentk/protocol/openid-connect/token
      - --oidc-jwks-url=http://keycloak:8080/keycloak/realms/agentk/protocol/openid-connect/certs
      # URL de callback após login — deve ser registrada no cliente Keycloak.
      - --redirect-url=https://agentk.local/oauth2/callback
      # O oauth2-proxy está atrás do Nginx TLS terminator.
      - --reverse-proxy=true
      # Restringe quais IPs podem enviar X-Forwarded-* confiáveis ao oauth2-proxy.
      # Defaults portáveis para redes privadas RFC1918 comuns em Docker/VM/VPS.
      - --trusted-proxy-ip=${OAUTH2_PROXY_TRUSTED_PROXY_IP_1:-172.16.0.0/12}
      - --trusted-proxy-ip=${OAUTH2_PROXY_TRUSTED_PROXY_IP_2:-10.0.0.0/8}
      - --trusted-proxy-ip=${OAUTH2_PROXY_TRUSTED_PROXY_IP_3:-192.168.0.0/16}
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET:-agentktccsecretkey1234567890abcd}
      # true = cookie com flag Secure (exige HTTPS — correto pois nginx termina TLS)
      - --cookie-secure=true
      - --cookie-samesite=lax
      # Mantem cookie de sessao minimo para reduzir tamanho de headers no callback.
      - --session-cookie-minimal=true
      # Evita falha de callback quando o usuario do Keycloak nao tem email_verified=true.
      - --insecure-oidc-allow-unverified-email=true
      # Evita fluxo OIDC paralelo para favicon, reduzindo callbacks redundantes.
      - --skip-auth-route=GET=^/favicon\.ico$
      - --email-domain=*
      - --skip-provider-button=true
      - --oidc-extra-audience=${OAUTH2_PROXY_CLIENT_ID:-oauth2-proxy}
      - --whitelist-domain=agentk.local
      - --backend-logout-url=http://keycloak:8080/keycloak/realms/agentk/protocol/openid-connect/logout
    ports:
      # Restrito a loopback: oauth2-proxy não usa TLS próprio, logo não deve ser
      # exposto externamente. O nginx é o único ponto de entrada HTTPS autorizado.
      - "127.0.0.1:4180:4180"
    networks:
      - agentk-network
    depends_on:
      # Aguarda Keycloak estar HEALTHY (realm importado e pronto) antes de iniciar.
      # Sem isso, oauth2-proxy tenta buscar o JWKS URL no startup, recebe 404
      # (realm ainda não existe) e crasha imediatamente.
      keycloak:
        condition: service_healthy
      agentk-client:
        condition: service_started
    # Sem healthcheck: a imagem quay.io/oauth2-proxy/oauth2-proxy usa base distroless
    # (gcr.io/distroless/static), que não possui shell, wget, curl ou qualquer utilitário.
    # A resiliência é garantida pelo depends_on acima e pelo restart: on-failure.
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Ollama — LLM Local
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    security_opt:
      - apparmor:unconfined
    ports:
      - "${OLLAMA_HOST_PORT:-11435}:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    entrypoint: [ "sh", "-c", "ollama serve & sleep 5 && ollama pull qwen2.5:1.5b && wait" ]
    networks:
      - agentk-network
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=-1
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Nginx - Reverse Proxy HTTPS para AgentK Client
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:80:80"
      - "${HOST_BIND_IP:-0.0.0.0}:443:443"
    networks:
      - agentk-network
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      # nginx inicia independentemente do oauth2-proxy.
      # Quando oauth2-proxy nao esta ativo, nginx retorna a pagina de erro customizada
      # (definida no nginx.conf) para '/', mas '/keycloak/' continua acessivel diretamente.
      agentk-client:
        condition: service_started
    restart: unless-stopped

# =============================================================================
# Redes
# =============================================================================
networks:
  agentk-network:
    driver: bridge
    name: agentk-network
  # minikube:
  #   external: true
  #   name: minikube

  # =============================================================================
  # Volumes
  # =============================================================================
volumes:
  keycloak-data:
    driver: local
  ollama-data:
    driver: local
  agentk-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/Agentk-Sugest/logs
