# =============================================================================
# Compose Final: Gateway + AgentK server/client
#
# Este arquivo ASSUME que o binário do gateway já foi compilado através
# do gradle (build/libs/gateway-sensor-1.0.0-obf.jar). Não realiza build local.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Gateway Java (Executa o JAR pré-compilado ofuscado)
  # ---------------------------------------------------------------------------
  gateway:
    image: eclipse-temurin:21-jre-jammy
    container_name: agentk-gateway
    restart: unless-stopped
    ports:
      - "8081:8080" # Alterado para 8081 no host para evitar conflito com Keycloak
    networks:
      - agentk-network
    environment:
      - WEBHOOK_PORT=8080
      - WEBHOOK_PATH=/validar
      - OLLAMA_ENDPOINT=http://ollama:11434/api/generate
      - OLLAMA_MODEL=qwen2.5:1.5b
      - KEYSTORE_PATH=/app/gateway-keystore.p12
      - KEYSTORE_PASSWORD=gateway-secret
    entrypoint: [ "java", "-jar", "/app/app.jar" ]
    depends_on:
      - ollama
    volumes:
      - ./build/libs/gateway-sensor-1.0.0-obf.jar:/app/app.jar:ro
      - ./config:/app/config:ro
      - ./inspection-terms.xml:/app/inspection-terms.xml:ro
      - ./monitored-sites.xml:/app/monitored-sites.xml:ro
      - ./gateway-keystore.p12:/app/gateway-keystore.p12:ro

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

