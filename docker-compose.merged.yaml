# =============================================================================
# Compose mesclado: Gateway + AgentK server/client
#
# O Dockerfile do gateway utiliza multi-stage build, logo o JAR ofuscado
# é compilado automaticamente pelo Docker durante o `docker compose build`.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Gateway Java (executa somente o JAR ofuscado)
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentk-security-gateway:1.0.0
    container_name: agentk-gateway
    restart: unless-stopped
    stdin_open: false
    tty: false

    # Necessario para regras iptables
    cap_add:
      - NET_ADMIN
      - NET_RAW

    # Usa rede do host para redirecionamento transparente de trafego
    network_mode: "host"

    environment:
      GATEWAY_MITM_PORT: "${GATEWAY_MITM_PORT:-8443}"
      WEBHOOK_PORT: "${WEBHOOK_PORT:-8080}"
      WEBHOOK_PATH: "${WEBHOOK_PATH:-/validar}"

      CA_CERT_PATH: "/app/certs/gateway-ca.crt"
      CA_KEY_PATH: "/app/keys/gateway-ca.key"

      KEYSTORE_FILE: "/app/keys/gateway-keystore.p12"
      KEYSTORE_PASSWORD: "${KEYSTORE_PASSWORD:-gateway-secret}"
      KEYSTORE_ALIAS: "agentk-gateway"

      # AGENTK_DOCKER_CONTAINER: "${AGENTK_DOCKER_CONTAINER:-agentk-mcp-server}"
      AGENTK_DOCKER_CONTAINER: "${AGENTK_DOCKER_CONTAINER:-127.0.0.1}"
      SKIP_DOCKER_CA_SETUP: "${SKIP_DOCKER_CA_SETUP:-0}"

      TARGET_PORT: "443"
      GATEWAY_PORT: "${GATEWAY_MITM_PORT:-8443}"
      GATEWAY_USER: "root"

    volumes:
      - gateway-certs:/app/certs
      - gateway-keys:/app/keys
      - ./config:/app/config:ro
      - ./inspection-terms.xml:/app/inspection-terms.xml:ro
      - ./monitored-sites.xml:/app/monitored-sites.xml:ro

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Servidor MCP AgentK
  # ---------------------------------------------------------------------------
  agentk-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: agentk-mcp-server
    ports:
      - "3333:3333"
    environment:
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
      - FASTMCP_HOST=${FASTMCP_HOST:-0.0.0.0}
      - FASTMCP_PORT=${FASTMCP_PORT:-3333}
      - FASTMCP_LOG_LEVEL=${FASTMCP_LOG_LEVEL:-INFO}
      - KUBECONFIG=/app/config
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # Faz o servidor confiar na CA do gateway
      - REQUESTS_CA_BUNDLE=/app/certs/gateway-ca.crt
      - SSL_CERT_FILE=/app/certs/gateway-ca.crt

    volumes:
      - ~/.kube/config-embedded:/app/config:ro
      - gateway-certs:/app/certs:ro

    networks:
      - agentk-network
      - minikube

    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',3333)); s.close()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Cliente Streamlit AgentK
  # ---------------------------------------------------------------------------
  agentk-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: agentk-streamlit-client

    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "8501:8501"

    environment:
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
      - STREAMLIT_SERVER_HEADLESS=${STREAMLIT_SERVER_HEADLESS:-true}
      - STREAMLIT_SERVER_ENABLE_CORS=${STREAMLIT_SERVER_ENABLE_CORS:-false}
      - MCP_SERVER_URL=${MCP_SERVER_URL:-http://agentk-server:3333}
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # Direciona chamadas HTTP/TLS do cliente para o gateway no host
      - HTTPS_PROXY=${HTTPS_PROXY:-http://host.docker.internal:8080}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://host.docker.internal:8080/v1}

      # Confia na CA gerada pelo gateway
      - REQUESTS_CA_BUNDLE=/app/certs/gateway-ca.crt
      - SSL_CERT_FILE=/app/certs/gateway-ca.crt

    volumes:
      - gateway-certs:/app/certs:ro

    networks:
      - agentk-network

    depends_on:
      agentk-server:
        condition: service_healthy
      gateway:
        condition: service_started

    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Keycloak
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: keycloak
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_DB=dev-file
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks:
      - agentk-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OAuth2 Proxy
  # ---------------------------------------------------------------------------
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    command:
      - --http-address=0.0.0.0:4180
      - --upstream=http://agentk-client:8501
      - --provider=keycloak-oidc
      - --client-id=${OAUTH2_PROXY_CLIENT_ID:-oauth2-proxy}
      - --client-secret=${OAUTH2_PROXY_CLIENT_SECRET:-SEU_CLIENT_SECRET}
      - --redeem-url=http://keycloak:8080/realms/agentk/protocol/openid-connect/token
      - --oidc-issuer-url=http://keycloak:8080/realms/agentk
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET:-agentktccsecretkey1234567890abcd}
      - --cookie-secure=false
      - --email-domain=*
      - --skip-provider-button=true
      - --oidc-extra-audience=${OAUTH2_PROXY_CLIENT_ID:-oauth2-proxy}
      - --whitelist-domain=keycloak
      - --backend-logout-url=http://keycloak:8080/realms/agentk/protocol/openid-connect/logout
    ports:
      - "127.0.0.1:4180:4180"
    networks:
      - agentk-network
    depends_on:
      - keycloak
      - agentk-client
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Ollama — LLM Local
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    entrypoint: [ "sh", "-c", "ollama serve & sleep 5 && ollama pull qwen2.5:1.5b && wait" ]
    networks:
      - agentk-network

# =============================================================================
# Redes
# =============================================================================
networks:
  agentk-network:
    driver: bridge
    name: agentk-network
  minikube:
    external: true
    name: minikube

# =============================================================================
# Volumes
# =============================================================================
volumes:
  gateway-certs:
    name: agentk-gateway-certs
  gateway-keys:
    name: agentk-gateway-keys
  agentk-logs:
    driver: local
  keycloak-data:
    driver: local
  ollama-data:
    driver: local
